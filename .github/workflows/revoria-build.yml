name: Revoria build

on:
  push:
    branches:
      - main
      - master
      - prod
      - release
      - beta
      - feature*
    tags:
      - release-*
      - beta-*
    paths:
      - .github/workflows/revoria-build.yml
      - 'apps/app/**'
      - 'apps/app-frontend/**'
      - 'packages/app-lib/**'
      - 'packages/app-macros/**'
      - 'packages/assets/**'
      - 'packages/ui/**'
      - 'packages/utils/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest, ubuntu-latest]
        include:
          - platform: macos-latest
            artifact-target-name: universal-apple-darwin
          - platform: windows-latest
            artifact-target-name: x86_64-pc-windows-msvc
          - platform: ubuntu-latest
            artifact-target-name: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Validate Git config does not introduce CRLF
        shell: bash
        run: |
          echo "Checking Git config for CRLF settings..."

          autocrlf=$(git config --get core.autocrlf || echo "unset")
          eol_setting=$(git config --get core.eol || echo "unset")

          echo "core.autocrlf = $autocrlf"
          echo "core.eol = $eol_setting"

          if [ "$autocrlf" = "true" ]; then
            echo "WARNING: core.autocrlf is set to 'true'. Consider setting it to 'input' or 'false'."
          fi

          if [ "$eol_setting" = "crlf" ]; then
            echo "WARNING: core.eol is set to 'crlf'. Consider unsetting it or setting to 'lf'."
          fi

      - name: Check migration files line endings (LF only)
        shell: bash
        run: |
          echo "Scanning migration SQL files for CR characters (\\r)..."
          if grep -Iq $'\r' packages/app-lib/migrations/*.sql; then
            echo "ERROR: Some migration files contain CR (\\r) characters - expected only LF line endings."
            exit 1
          fi
          echo "All migration files use LF line endings"

      - name: Setup Rust toolchain (Windows/Linux)
        if: matrix.platform != 'macos-latest'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.artifact-target-name }}

      - name: Setup Rust toolchain (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install macOS Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -yq \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            xdg-utils \
            openjdk-17-jdk

      - name: Ensure Gradle wrapper is executable
        if: matrix.platform != 'windows-latest'
        run: chmod +x packages/app-lib/java/gradlew

      - name: Set application environment
        shell: bash
        run: |
          cp packages/app-lib/.env.prod packages/app-lib/.env

      - name: Setup Turbo cache
        uses: rharkor/caching-for-turbo@v1.8

      - name: Install dependencies
        run: pnpm install

      - name: Set up Windows code signing (jsign)
        if: matrix.platform == 'windows-latest' && env.SIGN_WINDOWS_BINARIES == 'true'
        shell: bash
        run: |
          choco install jsign --ignore-dependencies

      - name: Clean up cached bundles
        shell: bash
        run: |
          rm -rf target/release/bundle
          rm -rf target/*/release/bundle || true

      - name: Build macOS app
        if: matrix.platform == 'macos-latest'
        run: pnpm --filter=@modrinth/app run tauri build --target universal-apple-darwin --config tauri-release.conf.json --bundles 'dmg'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Generate macOS updater manifests
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#release-}"
          VERSION="${VERSION#beta-}"
          MAC_ARCHIVE=$(find target -path '*release/bundle/macos/*.app.tar.gz' | head -n 1)
          MAC_SIG_FILE=$(find target -path '*release/bundle/macos/*.app.tar.gz.sig' | head -n 1)

          if [ -z "$MAC_ARCHIVE" ] || [ -z "$MAC_SIG_FILE" ]; then
            echo "Missing macOS updater archive or signature"
            exit 1
          fi

          MAC_ARCHIVE_NAME=$(basename "$MAC_ARCHIVE")
          MAC_SIG=$(tr -d '\r\n' < "$MAC_SIG_FILE")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${MAC_ARCHIVE_NAME}"

          cat > darwin-x86_64.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "Revoria ${VERSION}",
            "pub_date": "${PUB_DATE}",
            "url": "${DOWNLOAD_URL}",
            "signature": "${MAC_SIG}"
          }
          EOF

          cp darwin-x86_64.json darwin-aarch64.json

      - name: Build Linux app
        if: matrix.platform == 'ubuntu-latest'
        run: pnpm --filter=@modrinth/app run tauri build --config tauri-release.conf.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Generate Linux updater manifest
        if: matrix.platform == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#release-}"
          VERSION="${VERSION#beta-}"
          LINUX_ARCHIVE=$(find target -path '*release/bundle/appimage/*.AppImage.tar.gz' | head -n 1)
          LINUX_SIG_FILE=$(find target -path '*release/bundle/appimage/*.AppImage.tar.gz.sig' | head -n 1)

          if [ -z "$LINUX_ARCHIVE" ] || [ -z "$LINUX_SIG_FILE" ]; then
            echo "Missing Linux updater archive or signature"
            exit 1
          fi

          LINUX_ARCHIVE_NAME=$(basename "$LINUX_ARCHIVE")
          LINUX_SIG=$(tr -d '\r\n' < "$LINUX_SIG_FILE")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${LINUX_ARCHIVE_NAME}"

          cat > linux-x86_64.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "Revoria ${VERSION}",
            "pub_date": "${PUB_DATE}",
            "url": "${DOWNLOAD_URL}",
            "signature": "${LINUX_SIG}"
          }
          EOF

      - name: Build Windows app
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $env:JAVA_HOME = "$env:JAVA_HOME_17_X64"
          pnpm --filter=@modrinth/app run tauri build --config tauri-release.conf.json --verbose --bundles 'nsis'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Generate Windows updater manifest
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}" -replace '^release-', '' -replace '^beta-', ''
          $archive = Get-ChildItem -Path target -Recurse -Filter *.nsis.zip | Select-Object -First 1
          $sigFile = Get-ChildItem -Path target -Recurse -Filter *.nsis.zip.sig | Select-Object -First 1

          if (-not $archive -or -not $sigFile) {
            throw "Missing Windows updater archive or signature"
          }

          $sig = (Get-Content $sigFile.FullName -Raw).Trim()
          $pubDate = [DateTime]::UtcNow.ToString("yyyy-MM-ddTHH:mm:ssZ")
          $downloadUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:GITHUB_REF_NAME/$($archive.Name)"

          @"
          {
            "version": "$version",
            "notes": "Revoria $version",
            "pub_date": "$pubDate",
            "url": "$downloadUrl",
            "signature": "$sig"
          }
          "@ | Set-Content -Path windows-x86_64.json -NoNewline

      - name: Upload app bundles
        uses: actions/upload-artifact@v4
        with:
          name: App bundle (${{ matrix.artifact-target-name }})
          path: |
            target/release/bundle/**
            target/*/release/bundle/**
            *.json

      - name: Publish GitHub Release (attach installers)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          generate_release_notes: true
          files: |
            target/release/bundle/nsis/*.exe
            target/*/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.nsis.zip
            target/*/release/bundle/nsis/*.nsis.zip
            target/release/bundle/deb/*.deb
            target/*/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
            target/*/release/bundle/appimage/*.AppImage
            target/release/bundle/appimage/*.AppImage.tar.gz
            target/*/release/bundle/appimage/*.AppImage.tar.gz
            target/release/bundle/dmg/*.dmg
            target/*/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app.tar.gz
            target/*/release/bundle/macos/*.app.tar.gz
            target/release/bundle/**/*.sig
            target/*/release/bundle/**/*.sig
            *.json
